<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">🌤️ Weather Dashboard</h1>
                <div class="header-controls">
                    <button class="btn-theme" id="themeToggle" title="Toggle theme">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search for a city..."
                    autocomplete="off"
                >
                <button class="btn-search" id="searchBtn">🔍 Search</button>
                <button class="btn-location" id="locationBtn" title="Use my location">📍</button>
            </div>
            <div class="search-suggestions" id="suggestions"></div>
        </section>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Loading Indicator -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="mainContent" style="display: none;">
            <!-- Current Weather -->
            <section class="current-weather">
                <div class="weather-card">
                    <div class="weather-header">
                        <h2 class="location-name" id="locationName"></h2>
                        <p class="weather-date" id="weatherDate"></p>
                    </div>
                    <div class="weather-body">
                        <div class="temperature-section">
                            <div class="weather-icon" id="weatherIcon"></div>
                            <div class="temperature-info">
                                <div class="current-temp" id="currentTemp"></div>
                                <div class="feels-like" id="feelsLike"></div>
                            </div>
                        </div>
                        <div class="weather-description" id="weatherDescription"></div>
                    </div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <span class="detail-label">💧 Humidity</span>
                            <span class="detail-value" id="humidity"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">💨 Wind Speed</span>
                            <span class="detail-value" id="windSpeed"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">🔽 Pressure</span>
                            <span class="detail-value" id="pressure"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">👁️ Visibility</span>
                            <span class="detail-value" id="visibility"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">🌅 Sunrise</span>
                            <span class="detail-value" id="sunrise"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">🌇 Sunset</span>
                            <span class="detail-value" id="sunset"></span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Hourly Forecast -->
            <section class="forecast-section">
                <h3 class="section-title">📊 Hourly Forecast (Next 24 Hours)</h3>
                <div class="hourly-forecast" id="hourlyForecast"></div>
            </section>

            <!-- 7-Day Forecast -->
            <section class="forecast-section">
                <h3 class="section-title">📅 7-Day Forecast</h3>
                <div class="daily-forecast" id="dailyForecast"></div>
            </section>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
